<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080c14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>WorkLog</title>
<style>
:root{
  --bg:#080c14;--bg2:#0f1623;--bg3:#161e2e;--bg4:#1c2640;
  --border:#1e2d45;--border2:#2a3d5a;
  --text:#f0f4ff;--text2:#8899b8;--text3:#4a5a78;
  --accent:#3b7eff;--accent2:#6c3bff;--accent3:#ff3b7a;
  --green:#00d68f;--red:#ff4d6d;--yellow:#ffb830;--purple:#a855f7;--blue:#3b82f6;
  --grad:linear-gradient(135deg,#3b7eff,#6c3bff);
  --card-shadow:0 4px 24px rgba(0,0,0,.4);
  --glow:0 0 20px rgba(59,126,255,.15);
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
  --font:'SF Pro Display',-apple-system,system-ui,sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --trans:.2s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#ffffff;--bg3:#e8edf8;--bg4:#dce3f5;
  --border:#c8d3ea;--border2:#b0bdd8;
  --text:#0d1829;--text2:#4a5878;--text3:#8899b8;
  --card-shadow:0 4px 24px rgba(59,126,255,.08);
  --glow:0 0 20px rgba(59,126,255,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px;scroll-behavior:smooth}
::-webkit-scrollbar{display:none}

/* ── Animated background ── */
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:orb-drift 12s ease-in-out infinite}
.bg-orb:nth-child(1){width:300px;height:300px;background:#3b7eff;top:-80px;left:-60px;animation-delay:0s}
.bg-orb:nth-child(2){width:250px;height:250px;background:#6c3bff;bottom:100px;right:-80px;animation-delay:-4s}
.bg-orb:nth-child(3){width:200px;height:200px;background:#ff3b7a;bottom:-60px;left:30%;animation-delay:-8s}
@keyframes orb-drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-30px) scale(1.05)}66%{transform:translate(-15px,20px) scale(.95)}}
[data-theme="light"] .bg-orb{opacity:.04}

/* ── Header ── */
.header{padding:calc(env(safe-area-inset-top,14px) + 14px) 20px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative;z-index:10}
.header-left .wordmark{font-size:20px;font-weight:800;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-left .subtitle{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.header-right{display:flex;gap:8px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-xs);background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:var(--trans);color:var(--text2)}
.icon-btn:active{transform:scale(.9)}
.sync-pill{height:32px;padding:0 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:var(--trans);white-space:nowrap}
.sync-pill.ok{border-color:rgba(0,214,143,.3);color:var(--green)}
.sync-pill.err{border-color:rgba(255,77,109,.3);color:var(--red)}
.sync-pill.syncing{border-color:rgba(255,184,48,.3);color:var(--yellow)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sync-dot.pulse{animation:pulse-dot 1.5s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── Nav ── */
.nav{padding:12px 16px 0;flex-shrink:0;position:relative;z-index:10}
.nav-inner{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:4px}
.nav-btn{flex:1;padding:8px 0;border-radius:var(--radius-xs);border:none;cursor:pointer;font-size:11px;font-weight:700;transition:var(--trans);color:var(--text3);background:transparent;letter-spacing:.3px}
.nav-btn.active{background:var(--grad);color:#fff;box-shadow:0 2px 12px rgba(59,126,255,.35)}
.nav-btn span{display:block;font-size:16px;margin-bottom:1px}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:var(--trans)}
.card-glass{background:rgba(15,22,35,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
[data-theme="light"] .card-glass{background:rgba(255,255,255,.8)}
.card-accent-line{position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad)}

/* ── TODAY view ── */
.today-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,126,255,.06),rgba(108,59,255,.04));pointer-events:none}
.hero-date{font-size:12px;color:var(--text3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.hero-day{font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--text);margin-bottom:16px}
.status-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid;margin-bottom:16px;transition:var(--trans)}

.time-trio{display:grid;grid-template-columns:1fr 56px 1fr;gap:8px;margin-bottom:14px}
.time-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;transition:var(--trans)}
.time-block.clickable{cursor:pointer}
.time-block.clickable:active{transform:scale(.97);border-color:var(--accent)}
.time-block-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:700}
.time-block-val{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.time-block-hint{font-size:9px;color:var(--accent);margin-top:4px;font-weight:600}
.live-clock{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.live-clock-time{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text2);line-height:1;font-family:var(--mono)}
.live-clock-sec{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}

.earned-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.earned-left .eb-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.earned-left .eb-hours{font-size:28px;font-weight:900;color:var(--accent);letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
.earned-right{text-align:right}
.earned-right .eb-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.earned-right .eb-val{font-size:22px;font-weight:900;color:var(--green);letter-spacing:-.5px;line-height:1}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.action-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.act-btn{padding:13px 8px;border-radius:var(--radius-sm);border:none;font-size:12px;font-weight:700;cursor:pointer;transition:var(--trans);display:flex;flex-direction:column;align-items:center;gap:4px;line-height:1}
.act-btn span.icon{font-size:18px}
.act-btn:active{transform:scale(.95)}
.act-btn.primary{background:var(--grad);color:#fff;box-shadow:0 4px 16px rgba(59,126,255,.3)}
.act-btn.danger{background:linear-gradient(135deg,#ff4d6d,#ff1744);color:#fff;box-shadow:0 4px 16px rgba(255,77,109,.3)}
.act-btn.ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.act-btn.done{background:rgba(0,214,143,.1);border:1px solid rgba(0,214,143,.3);color:var(--green)}
.act-btn.warn{background:rgba(255,184,48,.1);border:1px solid rgba(255,184,48,.3);color:var(--yellow)}
.act-btn.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--blue)}
.act-btn.soft-red{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:var(--red)}
.act-btn.purple{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);color:var(--purple)}

/* Progress ring */
.progress-ring-wrap{display:flex;justify-content:center;margin-bottom:14px}
.progress-ring{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;stroke:url(#ring-grad);transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap{position:relative;width:100px;height:100px}

/* Mini stats row */
.mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.ms-pill{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;transition:var(--trans)}
.ms-num{font-size:18px;font-weight:900;line-height:1}
.ms-lbl{font-size:9px;color:var(--text3);margin-top:3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* ── CALENDAR ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-nav-btn{width:36px;height:36px;border-radius:var(--radius-xs);background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--trans)}
.month-nav-btn:active{transform:scale(.9)}
.month-label{font-weight:800;font-size:18px;letter-spacing:-.3px}
.cal-hdr-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-hdr{text-align:center;font-size:10px;color:var(--text3);font-weight:700;padding:4px 0;letter-spacing:.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-empty{aspect-ratio:1}
.cal-cell{aspect-ratio:1;border-radius:var(--radius-xs);border:1.5px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:700;position:relative;transition:var(--trans);background:var(--bg3)}
.cal-cell:active{transform:scale(.9)}
.cal-cell.future{color:var(--text3);cursor:default;background:var(--bg2);border-color:var(--border)}
.cal-cell.today{border-color:var(--accent)!important;box-shadow:0 0 0 1px rgba(59,126,255,.2)}
.cal-cell.sel{border-color:rgba(108,59,255,.8)!important;box-shadow:0 0 0 2px rgba(108,59,255,.2)}
.cal-cell .c-icon{font-size:9px;margin-top:1px;opacity:.9}
.cal-cell .c-hrs{font-size:7px;opacity:.6;margin-top:1px;font-family:var(--mono)}
.today-pip{position:absolute;top:3px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--accent)}

/* Day detail panel */
.day-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:10px;animation:slide-up .2s ease}
@keyframes slide-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dp-head{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.dp-close{font-size:18px;cursor:pointer;color:var(--text3);line-height:1}
.dp-times{display:grid;grid-template-columns:1fr 48px 1fr;gap:8px;margin-bottom:12px}
.dp-tbox{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center;cursor:pointer;transition:var(--trans)}
.dp-tbox:active{border-color:var(--accent);transform:scale(.97)}
.dp-tlbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:700}
.dp-tval{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.dp-thint{font-size:9px;color:var(--accent);margin-top:3px}
.dp-mid{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px}
.dp-mid-val{font-size:14px;font-weight:900;color:var(--accent)}
.dp-mid-sub{font-size:8px;color:var(--text3);margin-top:2px}
.mark-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mark-chip{padding:10px 4px;border-radius:var(--radius-xs);border:1.5px solid transparent;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:var(--trans);background:var(--bg3)}
.mark-chip:active{transform:scale(.93)}
.mark-chip span{display:block;font-size:16px;margin-bottom:2px}

/* ── STATS ── */
.earnings-hero{border-radius:var(--radius);padding:24px;margin-bottom:12px;background:linear-gradient(135deg,#0f1f45,#1a0f45);border:1px solid rgba(59,126,255,.2);position:relative;overflow:hidden}
.eh-glow{position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(108,59,255,.3),transparent 70%);pointer-events:none}
.eh-lbl{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.eh-amount{font-size:42px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.eh-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:6px}
.eh-row{display:flex;gap:16px;margin-top:16px}
.eh-stat{flex:1;background:rgba(255,255,255,.05);border-radius:var(--radius-xs);padding:10px;text-align:center}
.eh-stat-val{font-size:18px;font-weight:800;color:#fff}
.eh-stat-lbl{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.stat-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;transition:var(--trans)}
.sr-left{display:flex;align-items:center;gap:10px}
.sr-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sr-label{font-size:14px;font-weight:600}
.sr-val{font-size:16px;font-weight:800}
.sr-unit{font-size:11px;color:var(--text3);margin-left:2px}

/* Daily timeline */
.timeline-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px}
.tc-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px}
.tl-item{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.tl-item:last-child{margin-bottom:0}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;box-shadow:0 0 8px currentColor}
.tl-line{width:1px;background:var(--border);flex-shrink:0;height:100%}
.tl-text{font-size:12px;color:var(--text2);line-height:1.5}
.tl-time{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* ── SETUP ── */
.setup-hero{text-align:center;padding:32px 16px 24px}
.setup-icon{font-size:56px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.setup-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.7}
.setup-steps{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.setup-step{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);align-items:flex-start}
.setup-step:last-child{border-bottom:none}
.step-badge{width:28px;height:28px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.step-content{flex:1}
.step-title2{font-size:13px;font-weight:700;margin-bottom:3px}
.step-desc{font-size:12px;color:var(--text2);line-height:1.5}
.step-desc a{color:var(--accent);text-decoration:none}
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:10px;font-family:var(--mono);color:#00d68f;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:140px;overflow-y:auto;margin-top:8px}
.pill-btn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:var(--trans);margin-top:8px}
.pill-btn.grad{background:var(--grad);color:#fff;box-shadow:0 4px 20px rgba(59,126,255,.3)}
.pill-btn.grad:active{transform:scale(.97)}
.pill-btn.ghost2{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.pill-btn.red{background:rgba(255,77,109,.1);color:var(--red);border:1px solid rgba(255,77,109,.3)}
.url-field{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:13px;outline:none;transition:var(--trans);font-family:var(--font);margin-top:8px}
.url-field:focus{border-color:var(--accent)}

/* ── SETTINGS ── */
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.sr2-label{font-size:13px;font-weight:600;color:var(--text)}
.sr2-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sr2-right{text-align:right}
.settings-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:8px 12px;color:var(--text);font-size:14px;font-weight:700;text-align:right;width:130px;outline:none;transition:var(--trans)}
.settings-input:focus{border-color:var(--accent)}
.seg-control{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:3px;gap:3px}
.seg-opt{flex:1;padding:7px 8px;border-radius:6px;border:none;background:transparent;color:var(--text3);font-size:11px;font-weight:700;cursor:pointer;transition:var(--trans);text-align:center}
.seg-opt.on{background:var(--grad);color:#fff}
.curr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.curr-btn{padding:10px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:16px;cursor:pointer;text-align:center;transition:var(--trans)}
.curr-btn.sel{border-color:var(--accent);background:rgba(59,126,255,.1)}
.range-slider{width:100%;accent-color:var(--accent);margin-top:8px;cursor:pointer}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px}
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.info-box-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.info-box-body{font-size:12px;color:var(--text3);line-height:1.9}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fade-in .15s ease;backdrop-filter:blur(4px)}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px calc(env(safe-area-inset-bottom,0px) + 24px);width:100%;max-width:430px;animation:sheet-up .2s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--border)}
@keyframes sheet-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title2{font-size:16px;font-weight:800;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.time-row{display:flex;gap:12px;align-items:center;margin-bottom:20px}
.time-field{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:16px;color:var(--text);font-size:32px;font-weight:900;text-align:center;outline:none;font-variant-numeric:tabular-nums;font-family:var(--mono);transition:var(--trans)}
.time-field:focus{border-color:var(--accent)}
.time-colon{font-size:32px;font-weight:900;color:var(--text3)}
.modal-actions{display:flex;gap:10px}
.modal-btn2{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:var(--trans)}
.modal-btn2:active{transform:scale(.97)}
.mb-cancel{background:var(--bg3);color:var(--text2)}
.mb-save{background:var(--grad);color:#fff;box-shadow:0 4px 16px rgba(59,126,255,.3)}

/* ── Spinner ── */
.spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;z-index:999;box-shadow:var(--card-shadow);transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s;opacity:0;white-space:nowrap;max-width:90vw;display:flex;align-items:center;gap:8px}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.t-ok .t-icon::before{content:'✓';color:var(--green)}
#toast.t-err .t-icon::before{content:'⚠';color:var(--red)}
#toast.t-info .t-icon::before{content:'ℹ';color:var(--accent)}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;padding:0 2px}

/* ── Animations ── */
.fade-in{animation:fade-in .25s ease}
.slide-up{animation:slide-up .25s ease}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div class="bg-glow"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b7eff"/>
      <stop offset="100%" stop-color="#6c3bff"/>
    </linearGradient>
  </defs>
</svg>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="wordmark">WorkLog</div>
      <div class="subtitle">Attendance & Pay</div>
    </div>
    <div class="header-right">
      <div class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</div>
      <div class="sync-pill" id="sync-pill" onclick="syncNow()">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label">Setup</span>
      </div>
    </div>
  </div>

  <div class="nav" style="padding-bottom:10px">
    <div class="nav-inner">
      <button class="nav-btn active" id="nav-today" onclick="go('today')"><span>⏱</span>Today</button>
      <button class="nav-btn inactive" id="nav-cal" onclick="go('cal')"><span>📅</span>Calendar</button>
      <button class="nav-btn inactive" id="nav-stats" onclick="go('stats')"><span>📊</span>Stats</button>
      <button class="nav-btn inactive" id="nav-settings" onclick="go('settings')"><span>⚙️</span>Settings</button>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>
<div id="modal-root"></div>
<div id="toast"><span class="t-icon"></span><span id="toast-msg"></span></div>

<script>
// ═══════════════════════════════════════════════════════════
//  WorkLog — Data & State
// ═══════════════════════════════════════════════════════════
const MONTHS   = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_S = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS_L   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAYS_S   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const S = {
  present:{label:"Present", color:"var(--green)", bg:"rgba(0,214,143,.12)", border:"rgba(0,214,143,.3)", icon:"✓", dot:"#00d68f"},
  absent: {label:"Absent",  color:"var(--red)",   bg:"rgba(255,77,109,.12)",border:"rgba(255,77,109,.3)",icon:"✗", dot:"#ff4d6d"},
  half:   {label:"Half Day",color:"var(--yellow)",bg:"rgba(255,184,48,.12)", border:"rgba(255,184,48,.3)",icon:"½", dot:"#ffb830"},
  leave:  {label:"Leave",   color:"var(--purple)",bg:"rgba(168,85,247,.12)", border:"rgba(168,85,247,.3)",icon:"L", dot:"#a855f7"},
  holiday:{label:"Holiday", color:"var(--blue)",  bg:"rgba(59,130,246,.12)", border:"rgba(59,130,246,.3)",icon:"H", dot:"#3b82f6"},
  none:   {label:"—",       color:"var(--text3)", bg:"var(--bg3)",           border:"var(--border)",      icon:"·", dot:"#4a5a78"},
};

let records  = JSON.parse(localStorage.getItem('wl_records')  || '{}');
let cfg      = JSON.parse(localStorage.getItem('wl_cfg') || JSON.stringify({
  salary:30000, hourlyRate:0, hpd:8, currency:'₹', leaves:1,
  mode:'monthly', sheetUrl:'', connected:false, lastSync:null, theme:'dark'
}));

const now    = new Date();
let cY = now.getFullYear(), cM = now.getMonth();
let selDay = null, curView = 'today';
let ticker = null, syncing = false, dirty = false;

// ─── Util ──────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
function dkey(y,m,d){return`${y}-${pad(m+1)}-${pad(d)}`}
function tKey(){return dkey(now.getFullYear(),now.getMonth(),now.getDate())}
function cKey(d){return dkey(cY,cM,d)}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fday(y,m){return new Date(y,m,1).getDay()}
function isToday(d){return d===now.getDate()&&cM===now.getMonth()&&cY===now.getFullYear()}
function isPast(y,m,d){return new Date(y,m,d)<=now}
function nowHM(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes())}
function saveR(){localStorage.setItem('wl_records',JSON.stringify(records));dirty=true}
function saveC(){localStorage.setItem('wl_cfg',JSON.stringify(cfg))}

function hRate(){
  return cfg.mode==='hourly'?+(cfg.hourlyRate)||0:(+(cfg.salary)||0)/(26*(+(cfg.hpd)||8));
}
function calcH(ci,co){
  if(!ci||!co)return 0;
  const[ih,im]=ci.split(':').map(Number),[oh,om]=co.split(':').map(Number);
  return Math.max(0,((oh*60+om)-(ih*60+im))/60);
}
function fmtH(h){
  if(h<=0)return'—';
  const hr=Math.floor(h),mn=Math.round((h-hr)*60);
  if(hr===0)return mn+'m';if(mn===0)return hr+'h';return hr+'h '+mn+'m';
}
function fmtMoney(v){return cfg.currency+Math.round(v).toLocaleString('en-IN')}
function fmtTime(t){return t||'--:--'}

// ─── Theme ─────────────────────────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-btn').textContent=t==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  cfg.theme=cfg.theme==='dark'?'light':'dark';
  saveC();applyTheme(cfg.theme);
}
applyTheme(cfg.theme||'dark');

// ─── Sync ──────────────────────────────────────────────────
function getUrl(){return(cfg.sheetUrl||'').split('?')[0]}
function updateSyncUI(state){
  const pill=document.getElementById('sync-pill');
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!pill)return;
  pill.className='sync-pill '+state;
  dot.className='sync-dot'+(state==='syncing'?' pulse':'');
  if(state==='ok'){const t=cfg.lastSync?new Date(cfg.lastSync).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'now';lbl.textContent='Synced '+t}
  else if(state==='syncing')lbl.textContent='Syncing…';
  else if(state==='err')lbl.textContent='Sync error';
  else lbl.textContent=cfg.sheetUrl?'Tap to sync':'Setup';
}

async function syncNow(silent=false){
  if(!cfg.sheetUrl){if(!silent)toast('No sheet connected','err');return}
  if(syncing)return;
  syncing=true;updateSyncUI('syncing');
  try{
    const res=await fetch(getUrl()+'?action=sync',{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({records,settings:{monthlySalary:cfg.salary,hourlyRate:cfg.hourlyRate,workHoursPerDay:cfg.hpd,currency:cfg.currency,paidLeaves:cfg.leaves,rateMode:cfg.mode}})});
    const j=await res.json();
    if(j.status==='ok'){
      if(j.records)records={...j.records,...records};
      localStorage.setItem('wl_records',JSON.stringify(records));
      cfg.lastSync=new Date().toISOString();cfg.connected=true;saveC();dirty=false;
      updateSyncUI('ok');if(!silent)toast('Synced with Google Sheet','ok');render();
    }else throw new Error(j.error||'Failed');
  }catch(e){updateSyncUI('err');if(!silent)toast('Sync failed: '+e.message,'err')}
  syncing=false;
}
async function pullSheet(){
  if(!cfg.sheetUrl)return;
  try{
    const res=await fetch(getUrl()+'?action=pull&t='+Date.now());
    const j=await res.json();
    if(j.status==='ok'&&j.records){
      records={...records,...j.records};localStorage.setItem('wl_records',JSON.stringify(records));
      if(j.settings){const s=j.settings;cfg.salary=s.monthlySalary||cfg.salary;cfg.hourlyRate=s.hourlyRate||cfg.hourlyRate;cfg.currency=s.currency||cfg.currency;cfg.leaves=s.paidLeaves||cfg.leaves;cfg.mode=s.rateMode||cfg.mode;cfg.hpd=s.workHoursPerDay||cfg.hpd}
      cfg.lastSync=new Date().toISOString();cfg.connected=true;saveC();updateSyncUI('ok');render();
    }
  }catch(e){updateSyncUI('err')}
}
setInterval(()=>{if(cfg.sheetUrl&&dirty)syncNow(true)},120000);

// ─── Nav ───────────────────────────────────────────────────
function go(v){
  curView=v;selDay=null;clearInterval(ticker);
  ['today','cal','stats','settings'].forEach(n=>{
    const el=document.getElementById('nav-'+n);
    if(el)el.className='nav-btn '+(n===v?'active':'inactive');
  });
  render();if(v==='today')startTick();
}

function render(){
  updateSyncUI(cfg.sheetUrl?(cfg.connected?'ok':'err'):'idle');
  const c=document.getElementById('content');
  c.className='content fade-in';
  void c.offsetWidth;
  if(!cfg.sheetUrl&&curView!=='settings'){c.innerHTML=viewSetup();return}
  if(curView==='today')    c.innerHTML=viewToday();
  if(curView==='cal')      c.innerHTML=viewCal();
  if(curView==='stats')    c.innerHTML=viewStats();
  if(curView==='settings') c.innerHTML=viewSettings();
}

// ═══════════════════════════════════════════════════════════
//  TODAY VIEW
// ═══════════════════════════════════════════════════════════
function viewToday(){
  const tk=tKey(), rec=records[tk]||{};
  const st=rec.status||'none', sv=S[st];
  const ci=rec.checkIn||null, co=rec.checkOut||null;
  const hrs=calcH(ci,co), earned=hrs*hRate();
  const dayName=DAYS_L[now.getDay()];
  const dateStr=MONTHS_S[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();

  // Progress toward target hours
  const target=+(cfg.hpd)||8;
  const pct=Math.min(1,hrs/target);
  const circ=2*Math.PI*44;
  const dash=circ*pct;

  const statusChip=`<div class="status-chip" style="color:${sv.color};background:${sv.bg};border-color:${sv.border}">
    <span>${sv.icon}</span><span>${sv.label}</span>
  </div>`;

  const hero=`<div class="today-hero">
    <div class="hero-bg"></div>
    <div class="hero-date">${dateStr}</div>
    <div class="hero-day">${dayName}</div>
    ${statusChip}

    <div class="time-trio">
      <div class="time-block ${ci?'clickable':''}" onclick="${ci?'openModal(\'today\',\'in\')':''}">
        <div class="time-block-lbl">Check In</div>
        <div class="time-block-val" style="color:${ci?'var(--green)':'var(--text3)'}">${fmtTime(ci)}</div>
        ${ci?'<div class="time-block-hint">tap to edit</div>':'<div class="time-block-hint" style="color:var(--text3)">not set</div>'}
      </div>
      <div class="time-block" style="padding:8px">
        <div class="live-clock">
          <div class="live-clock-time" id="live-t">--:--</div>
          <div class="live-clock-sec" id="live-s">--</div>
        </div>
      </div>
      <div class="time-block ${co?'clickable':''}" onclick="${co?'openModal(\'today\',\'out\')':''}">
        <div class="time-block-lbl">Check Out</div>
        <div class="time-block-val" style="color:${co?'var(--red)':'var(--text3)'}">${fmtTime(co)}</div>
        ${co?'<div class="time-block-hint">tap to edit</div>':'<div class="time-block-hint" style="color:var(--text3)">not set</div>'}
      </div>
    </div>

    <div class="earned-bar">
      <div class="earned-left">
        <div class="eb-lbl">Hours Today</div>
        <div class="eb-hours">${hrs>0?fmtH(hrs):'—'}</div>
      </div>
      <div style="position:relative;width:80px;height:80px;flex-shrink:0">
        <svg class="progress-ring" width="80" height="80" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="44"/>
          <circle class="ring-fill" cx="50" cy="50" r="44" stroke-dasharray="${circ}" stroke-dashoffset="${circ-dash}"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:14px;font-weight:900;color:var(--accent)">${Math.round(pct*100)}%</div>
          <div style="font-size:8px;color:var(--text3);margin-top:1px">of ${target}h</div>
        </div>
      </div>
      <div class="earned-right">
        <div class="eb-lbl">Earned</div>
        <div class="eb-val">${hrs>0?fmtMoney(earned):'—'}</div>
      </div>
    </div>

    ${actionButtons(st,ci,co)}
  </div>`;

  const monthCard=miniMonthCard();
  return hero+monthCard;
}

function actionButtons(st,ci,co){
  if(st==='holiday'||st==='leave'||st==='absent'){
    const sv=S[st];
    return`<div class="action-grid">
      <div class="act-btn ghost" style="flex-direction:row;gap:8px;padding:14px 12px;justify-content:center">
        <span style="color:${sv.color}">${sv.icon}</span><span style="color:var(--text2)">${sv.label} marked</span>
      </div>
      <button class="act-btn ghost" onclick="clearToday()"><span class="icon">🗑</span>Clear</button>
    </div>`;
  }
  const canIn=!ci, canOut=ci&&!co;
  return`<div class="action-grid" style="margin-bottom:8px">
    <button class="act-btn ${canIn?'primary':'done'}" onclick="${canIn?'doCheckIn()':''}">
      <span class="icon">${ci?'✓':'▶'}</span>${ci?'Checked In':'Check In'}
    </button>
    <button class="act-btn ${canOut?'danger':'${co?\'done\':\'ghost\'}'}" onclick="${canOut?'doCheckOut()':''}">
      <span class="icon">${co?'✓':'■'}</span>${co?'Checked Out':'Check Out'}
    </button>
  </div>
  <div class="action-grid-3">
    <button class="act-btn info" onclick="markT('holiday')"><span class="icon">🏖</span>Holiday</button>
    <button class="act-btn purple" onclick="markT('leave')"><span class="icon">🌿</span>Leave</button>
    <button class="act-btn soft-red" onclick="markT('absent')"><span class="icon">✗</span>Absent</button>
  </div>`;
}

function miniMonthCard(){
  const st=statsFor(now.getFullYear(),now.getMonth());
  const plu=Math.min(st.leave,cfg.leaves);
  return`<div class="section-label">${MONTHS_S[now.getMonth()]} Overview</div>
  <div class="mini-stats">
    <div class="ms-pill"><div class="ms-num" style="color:var(--green)">${st.present}</div><div class="ms-lbl">Present</div></div>
    <div class="ms-pill"><div class="ms-num" style="color:var(--red)">${st.absent}</div><div class="ms-lbl">Absent</div></div>
    <div class="ms-pill"><div class="ms-num" style="color:var(--yellow)">${st.half}</div><div class="ms-lbl">Half</div></div>
    <div class="ms-pill"><div class="ms-num" style="color:var(--purple)">${st.leave}</div><div class="ms-lbl">Leave</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div class="ms-pill" style="padding:14px 12px">
      <div class="ms-num" style="color:var(--accent);font-size:20px">${fmtH(st.totalHours)}</div>
      <div class="ms-lbl" style="margin-top:4px">Total Hours</div>
    </div>
    <div class="ms-pill" style="padding:14px 12px">
      <div class="ms-num" style="color:var(--green);font-size:20px">${fmtMoney(st.earned)}</div>
      <div class="ms-lbl" style="margin-top:4px">Earned</div>
    </div>
  </div>`;
}

function doCheckIn(){
  const tk=tKey();records[tk]=records[tk]||{};
  records[tk].checkIn=nowHM();records[tk].status='present';
  saveR();toast('Checked in at '+records[tk].checkIn,'ok');render();startTick();syncNow(true);
}
function doCheckOut(){
  const tk=tKey();records[tk]=records[tk]||{};
  records[tk].checkOut=nowHM();saveR();
  const h=calcH(records[tk].checkIn,records[tk].checkOut);
  toast('Checked out · '+fmtH(h),'ok');render();syncNow(true);
}
function markT(s){
  const tk=tKey();records[tk]={...(records[tk]||{}),status:s};
  saveR();toast('Marked as '+S[s].label,'info');render();syncNow(true);
}
function clearToday(){delete records[tKey()];saveR();render();syncNow(true)}

function startTick(){
  clearInterval(ticker);tick();ticker=setInterval(tick,1000);
}
function tick(){
  const lt=document.getElementById('live-t'),ls=document.getElementById('live-s');
  if(!lt){clearInterval(ticker);return}
  const d=new Date();lt.textContent=pad(d.getHours())+':'+pad(d.getMinutes());ls.textContent=pad(d.getSeconds());
  // update hours dynamically
  const tk=tKey(),rec=records[tk]||{};
  if(rec.checkIn&&!rec.checkOut){
    const h=calcH(rec.checkIn,pad(d.getHours())+':'+pad(d.getMinutes()));
    const el=document.querySelector('.eb-hours');if(el)el.textContent=fmtH(h);
    const ev=document.querySelector('.eb-val');if(ev)ev.textContent=fmtMoney(h*hRate());
    const target=+(cfg.hpd)||8,pct=Math.min(1,h/target),circ=2*Math.PI*44;
    const rf=document.querySelector('.ring-fill');
    if(rf)rf.setAttribute('stroke-dashoffset',circ-circ*pct);
    const rl=document.querySelector('.ring-fill+*');
    const rpct=document.querySelector('.ring-fill')?.closest('svg')?.nextElementSibling?.querySelector('div:first-child');
    if(rpct)rpct.textContent=Math.round(pct*100)+'%';
  }
}

// ═══════════════════════════════════════════════════════════
//  CALENDAR VIEW
// ═══════════════════════════════════════════════════════════
function viewCal(){
  const d=dim(cY,cM),fd=fday(cY,cM);
  const hdrs=DAYS_S.map(d=>`<div class="cal-hdr">${d}</div>`).join('');
  const emp=Array(fd).fill('<div class="cal-empty"></div>').join('');
  let cells='';
  for(let i=1;i<=d;i++){
    const dk=cKey(i),rec=records[dk]||{};
    const st=rec.status||'none',sv=S[st];
    const future=!isPast(cY,cM,i),tod=isToday(i),sel=selDay===i;
    const hrs=calcH(rec.checkIn,rec.checkOut);
    let cls='cal-cell';
    if(future)cls+=' future';if(tod)cls+=' today';if(sel)cls+=' sel';
    const bg=future?'':`background:${sv.bg};`;
    const col=future?'':`color:${sv.color};`;
    cells+=`<div class="${cls}" style="${bg}${col}" ${future?'':'onclick="selC('+i+')"'}>
      ${tod?'<span class="today-pip"></span>':''}
      <span>${i}</span>
      ${future?'':'<span class="c-icon">'+sv.icon+'</span>'}
      ${(!future&&hrs>0)?'<span class="c-hrs">'+fmtH(hrs)+'</span>':''}
    </div>`;
  }

  let panel='';
  if(selDay!==null){
    const dk=cKey(selDay),rec=records[dk]||{};
    const hrs=calcH(rec.checkIn,rec.checkOut),earn=hrs*hRate(),st=rec.status||'none';
    const markBtns=Object.entries(S).filter(([k])=>k!=='none').map(([k,sv])=>{
      const active=st===k?`border-color:${sv.dot};box-shadow:0 0 0 1px ${sv.dot}20`:'';
      return`<div class="mark-chip" style="${active}" onclick="markC('${k}')">
        <span>${sv.icon}</span><span style="color:${sv.color}">${sv.label}</span>
      </div>`;
    }).join('');
    panel=`<div class="day-panel">
      <div class="dp-head">
        <span>${MONTHS_S[cM]} ${selDay}, ${cY}</span>
        <span class="dp-close" onclick="selDay=null;render()">✕</span>
      </div>
      <div class="dp-times">
        <div class="dp-tbox" onclick="openModal('${dk}','in')">
          <div class="dp-tlbl">Check In</div>
          <div class="dp-tval" style="color:${rec.checkIn?'var(--green)':'var(--text3)'}">${fmtTime(rec.checkIn)}</div>
          <div class="dp-thint">${rec.checkIn?'tap to edit':'tap to set'}</div>
        </div>
        <div class="dp-mid">
          <div class="dp-mid-val">${hrs>0?fmtH(hrs):'—'}</div>

function statsFor(y,m){
  const d=dim(y,m);
  let present=0,absent=0,half=0,leave=0,holiday=0,unmarked=0,totalHours=0;
  for(let i=1;i<=d;i++){
    if(!isPast(y,m,i))continue;
    const rec=records[dkey(y,m,i)]||{},st=rec.status||'none';
    if(st==='present')present++;else if(st==='absent')absent++;
    else if(st==='half')half++;else if(st==='leave')leave++;
    else if(st==='holiday')holiday++;else unmarked++;
    totalHours+=calcH(rec.checkIn,rec.checkOut);
  }
  const hr=hRate(),plu=Math.min(leave,+(cfg.leaves)||0);
  const earned=totalHours>0?totalHours*hr:(present+half*.5+plu)*(+(cfg.hpd)||8)*hr;
  const workDays=d-holiday;
  const perDay=Math.round((+(cfg.salary)||0)/(workDays||1));
  return{present,absent,half,leave,holiday,unmarked,totalHours,earned:Math.round(earned),plu,workDays,perDay};
}

const GS_CODE=`const SHEET_NAME='Attendance',SETTINGS_NAME='Settings';
function doPost(e){
  try{
    const data=JSON.parse(e.postData.contents),ss=SpreadsheetApp.getActiveSpreadsheet();
    if(data.records){saveRecords(ss,data.records,data.settings||{})}
    if(data.settings){saveSettings(ss,data.settings)}
    return jsonOk({records:readRecords(getOrCreate(ss,SHEET_NAME))});
  }catch(err){return jsonError(err.message)}
}
function doGet(e){
  try{
    const ss=SpreadsheetApp.getActiveSpreadsheet();
    const records=readRecords(getOrCreate(ss,SHEET_NAME));
    const settings=readSettings(ss);
    return jsonOk({records,settings});
  }catch(err){return jsonError(err.message)}
}
function saveRecords(ss,records,s){
  const sh=getOrCreate(ss,SHEET_NAME),hr=calcHR(s);
  const rows=[['Date','Status','Check In','Check Out','Hours','Earned']];
  Object.entries(records).sort(([a],[b])=>a.localeCompare(b)).forEach(([k,v])=>{
    const h=calcH(v.checkIn,v.checkOut);
    rows.push([k,v.status||'',v.checkIn||'',v.checkOut||'',h>0?h.toFixed(2):'',(h*hr).toFixed(2)]);
  });
  sh.clearContents();sh.getRange(1,1,rows.length,6).setValues(rows);
  sh.getRange(1,1,1,6).setFontWeight('bold').setBackground('#0f1623').setFontColor('#ffffff');
  sh.setFrozenRows(1);sh.autoResizeColumns(1,6);
}
function readRecords(sh){
  const data=sh.getDataRange().getValues(),result={};
  for(let i=1;i<data.length;i++){const[k,s,ci,co]=data[i];if(k)result[String(k)]={status:s||'none',checkIn:ci||'',checkOut:co||''}}
  return result;
}
function saveSettings(ss,s){
  const sh=getOrCreate(ss,SETTINGS_NAME);sh.clearContents();
  const rows=Object.entries(s).map(([k,v])=>[k,v]);
  if(rows.length)sh.getRange(1,1,rows.length,2).setValues(rows);
}
function readSettings(ss){
  try{const sh=ss.getSheetByName(SETTINGS_NAME);if(!sh)return{};const d=sh.getDataRange().getValues(),s={};d.forEach(([k,v])=>{if(k)s[k]=v});return s}catch(e){return{}}
}
function getOrCreate(ss,name){return ss.getSheetByName(name)||ss.insertSheet(name)}
function calcH(ci,co){if(!ci||!co)return 0;const[ih,im]=ci.split(':').map(Number),[oh,om]=co.split(':').map(Number);return Math.max(0,((oh*60+om)-(ih*60+im))/60)}
function calcHR(s){if(s.rateMode==='hourly')return+(s.hourlyRate)||0;return(+(s.monthlySalary)||0)/(26*(+(s.workHoursPerDay)||8))}
function jsonOk(d){return ContentService.createTextOutput(JSON.stringify({status:'ok',...d})).setMimeType(ContentService.MimeType.JSON)}
function jsonError(m){return ContentService.createTextOutput(JSON.stringify({status:'error',error:m})).setMimeType(ContentService.MimeType.JSON)}`;

function openModal(ctx,type){
  let cur='09:00';
  if(ctx==='today'){const r=records[tKey()]||{};cur=type==='in'?(r.checkIn||nowHM()):(r.checkOut||nowHM())}
  else{const r=records[ctx]||{};cur=type==='in'?(r.checkIn||'09:00'):(r.checkOut||'18:00')}
  const[hh,mm]=cur.split(':');
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title2">Set ${type==='in'?'Check-In':'Check-Out'} Time</div>
      <div class="modal-sub">${ctx==='today'?'Today':'Selected day'} · ${type==='in'?'When did you start?':'When did you finish?'}</div>
      <div class="time-row">
        <input class="time-field" id="mh" type="number" min="0" max="23" value="${hh}" inputmode="numeric">
        <span class="time-colon">:</span>
        <input class="time-field" id="mm2" type="number" min="0" max="59" value="${mm}" inputmode="numeric">
      </div>
      <div class="modal-actions">
        <button class="modal-btn2 mb-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn2 mb-save" onclick="saveModal('${ctx}','${type}')">Save Time</button>
      </div>
    </div>
  </div>`;
}
function saveModal(ctx,type){
  const h=pad(+document.getElementById('mh').value),m=pad(+document.getElementById('mm2').value);
  const dk=ctx==='today'?tKey():ctx;
  records[dk]=records[dk]||{};
  if(type==='in')records[dk].checkIn=h+':'+m;
  if(type==='out')records[dk].checkOut=h+':'+m;
  if(!records[dk].status)records[dk].status='present';
  saveR();closeModal();render();if(ctx==='today')startTick();
  toast('Time set to '+h+':'+m,'ok');syncNow(true);
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modal-root').innerHTML=''}

let toastT;
function toast(msg,type='info'){
  const el=document.getElementById('toast'),ml=document.getElementById('toast-msg');
  ml.textContent=msg;el.className='show t-'+type;
  clearTimeout(toastT);toastT=setTimeout(()=>el.className='',2800);

if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
}
